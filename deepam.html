<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgb(1, 1, 134) 60%, rgb(103, 100, 255) 40%);
        }

        .container {
            height: 500px;
            width: 500px;
            border: 1px solid transparent;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .deepam {
            height: 150px;
            width: 300px;
            background: rgb(255, 217, 0);
            border-radius: 0 0 1000px 1000px;
            position: absolute;
            left: 0;
            right: 0;
            margin: auto;
            bottom: 20px;
            overflow: hidden;
        }

        .deepam-circle {
            height: 60px;
            width: 300px;
            background: orange;
            border-radius: 50%;
            position: absolute;
            margin: auto;
            left: 0;
            right: 0;
            bottom: 140px;
        }

        .deepam-shadow {
            background: rgba(0, 0, 136, 0.5);
            height: 40px;
            width: 230px;
            position: absolute;
            bottom: 0px;
            left: 0;
            right: 0;
            margin: auto;
            border-radius: 50%;
            z-index: -1;
            filter: blur(2px);
        }

        .flame {
            background: white;
            height: 240px;
            width: 80px;
            border-radius: 100%;
            position: absolute;
            left: 0;
            right: 0;
            margin: auto;
            bottom: 150px;
            z-index: 1;
            animation: flame 2s linear infinite;
            transform-origin: bottom;
        }

        @keyframes flame {
            50% {
                transform: scale(1.05);
                bottom: 150px;
            }
        }

        .flame::after {
            content: '';
            background-color: rgb(238, 255, 0);
            height: 140px;
            width: 50px;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            border-radius: 100%;
        }

        .flame::before {
            content: '';
            background-color: rgb(255, 102, 0);
            height: 80px;
            width: 24px;
            z-index: 1;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            border-radius: 100%;
        }

        .flame-light {
            height: 320px;
            width: 320px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 100%;
            position: absolute;
            left: 0;
            right: 0;
            margin: auto;
            bottom: 140px;
        }

        .flame-light::after,
        .flame-light::before {
            content: '';
            border-radius: 100%;
            background: rgb(255, 255, 255, 0.2);
            height: 100px;
            width: 100px;
            position: absolute;
            left: 70px;
            top: 20px;
            animation: flame-light 2s linear infinite;
            backdrop-filter: blur(3px);
        }

        .flame-light::before {
            top: 140px;
            left: 240px;
        }

        @keyframes flame-light {
            50% {
                transform: scale(1.05);
                background: rgb(255, 255, 255, 0.03);
            }
        }

        .line-1,
        .line-2 {
            height: 60px;
            width: 320px;
            position: absolute;
            left: -10px;
            top: 64px;
            border: none;
            border-bottom: 8px solid white;
            border-radius: 50%;
        }

        .line-2 {
            top: 10px;
        }

        .dotted-line {
            height: 60px;
            width: 320px;
            border-bottom: 10px dotted orangered;
            position: absolute;
            bottom: 52px;
            left: -10px;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="deepam">
            <div class="line-1"></div>
            <div class="line-2"></div>
            <div class="dotted-line"></div>
        </div>
        <div class="deepam-circle"></div>
        <div class="deepam-shadow"></div>
        <div class="flame"></div>
        <div class="flame-light"></div>
    </div>
</body>

</html>
